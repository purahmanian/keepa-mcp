name: Release

# On a version tag: build, test, publish to npm via OIDC trusted publishing
# (provenance automatic), then sync server.json to the tag and publish the
# metadata to the official MCP registry via GitHub OIDC. No tokens or secrets.

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('server.json'));j.version='$VERSION';if(j.packages&&j.packages[0])j.packages[0].version='$VERSION';fs.writeFileSync('server.json',JSON.stringify(j,null,2)+'\n')"

      - name: Publish to MCP registry (GitHub OIDC)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
